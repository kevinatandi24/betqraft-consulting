<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetQraft Consulting — iGaming Market-Entry Advisory</title>
<meta name="description" content="A customizable, section-by-section consultancy landing page template. Edit colors and fonts in the CSS variables, and edit all copy in the SITE_CONTENT object at the bottom.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600;9..144,700&family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

/* ================================================================
   CUSTOMIZE YOUR BRAND HERE — colors, fonts, spacing, radius
   Change these variables and the whole page updates.
   ================================================================ */
:root{
  --color-bg:        #ECEEE6;   /* page background (light sections) */
  --color-surface:   #FFFFFF;   /* card backgrounds */
  --color-ink:        #15252A;  /* near-black, headings, dark sections */
  --color-ink-soft:   #44595B;  /* secondary / body text */
  --color-brass:      #C8973A;  /* primary accent — buttons, numbers */
  --color-brass-dark: #A87C28;  /* brass hover state */
  --color-teal:       #3E6B5E;  /* secondary accent — links, icons */
  --color-line:       #D7D9CD;  /* hairline borders, light bg */
  --color-line-dark:  rgba(244,243,236,0.16); /* hairline borders, dark bg */
  --color-paper-text: rgba(244,243,236,0.82); /* body copy on dark bg */

  --font-display: 'Fraunces', Georgia, serif;
  --font-body:    'Archivo', -apple-system, sans-serif;
  --font-mono:    'IBM Plex Mono', 'Courier New', monospace;

  --radius-sm: 4px;
  --radius-md: 8px;
  --container: 1180px;
  --section-pad: clamp(4rem, 8vw, 6.5rem);
}

*{ box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{
  margin:0;
  background:var(--color-bg);
  color:var(--color-ink);
  font-family:var(--font-body);
  font-size:16px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
img{ max-width:100%; display:block; }
a{ color:inherit; text-decoration:none; }
ul{ margin:0; padding:0; list-style:none; }
h1,h2,h3{ font-family:var(--font-display); font-weight:600; line-height:1.1; margin:0; }
p{ margin:0; }
button{ font-family:inherit; cursor:pointer; background:none; border:none; }

.container{ max-width:var(--container); margin:0 auto; padding:0 1.5rem; }
.sr-only{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }

.skip-link{
  position:absolute; left:-999px; top:0; background:var(--color-brass); color:var(--color-ink);
  padding:.6rem 1rem; z-index:200; font-weight:600;
}
.skip-link:focus{ left:1rem; top:1rem; }

:focus-visible{ outline:2px solid var(--color-brass); outline-offset:3px; }

/* ---------- Eyebrow / utility label ---------- */
.eyebrow{
  display:inline-flex; align-items:center; gap:.5rem;
  font-family:var(--font-mono); font-size:.72rem; letter-spacing:.14em; text-transform:uppercase;
  color:var(--color-teal); font-weight:500; margin-bottom:1rem;
}
.eyebrow .ico{ width:14px; height:14px; color:var(--color-brass); }
.on-dark .eyebrow{ color:#D9C68F; }
.on-dark .eyebrow .ico{ color:var(--color-brass); }

.section-head{ max-width:640px; margin-bottom:3rem; }
.section-head h2{ font-size:clamp(1.9rem, 3.4vw, 2.6rem); margin-bottom:.9rem; }
.section-head p{ color:var(--color-ink-soft); font-size:1.05rem; }

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex; align-items:center; gap:.5rem;
  padding:.85rem 1.5rem; border-radius:var(--radius-sm);
  font-weight:600; font-size:.95rem; transition:background .2s ease, color .2s ease, transform .15s ease;
  white-space:nowrap;
}
.btn-primary{ background:var(--color-brass); color:var(--color-ink); }
.btn-primary:hover{ background:var(--color-brass-dark); transform:translateY(-1px); }
.btn-ghost{ border:1px solid var(--color-line); color:var(--color-ink); }
.btn-ghost:hover{ border-color:var(--color-ink); }
.on-dark .btn-ghost{ border-color:var(--color-line-dark); color:#F4F3EC; }
.on-dark .btn-ghost:hover{ border-color:#F4F3EC; }
.btn-sm{ padding:.6rem 1.1rem; font-size:.85rem; }
.btn-text{ color:var(--color-teal); font-weight:600; border-bottom:1px solid currentColor; padding:.1rem 0; }

/* ================================================================
   SECTION 1 — HEADER / NAV
   ================================================================ */
.site-header{
  position:sticky; top:0; z-index:100;
  background:transparent;
  transition:background .3s ease, box-shadow .3s ease;
}
.site-header.is-scrolled{
  background:rgba(236,238,230,0.92); backdrop-filter:blur(8px);
  box-shadow:0 1px 0 var(--color-line);
}
.header-inner{
  display:flex; align-items:center; justify-content:space-between;
  height:76px;
}
.logo{ font-family:var(--font-display); font-weight:600; font-size:1.25rem; color:#F4F3EC; letter-spacing:-.01em; }
.site-header.is-scrolled .logo{ color:var(--color-ink); }
.logo span{ color:var(--color-brass); }

.nav-desktop{ display:none; gap:2.1rem; }
.nav-desktop a{
  font-size:.92rem; font-weight:500; color:#F4F3EC; opacity:.88;
  transition:opacity .2s ease;
}
.site-header.is-scrolled .nav-desktop a{ color:var(--color-ink); opacity:.78; }
.nav-desktop a:hover{ opacity:1; }

.header-actions{ display:flex; align-items:center; gap:.9rem; }
.site-header:not(.is-scrolled) .header-actions .btn-primary{ background:var(--color-brass); }

.nav-toggle{
  display:flex; flex-direction:column; justify-content:center; gap:5px;
  width:38px; height:38px; padding:0;
}
.nav-toggle span{
  display:block; width:22px; height:2px; background:#F4F3EC; margin:0 auto; transition:background .2s ease, transform .25s ease, opacity .2s ease;
}
.site-header.is-scrolled .nav-toggle span{ background:var(--color-ink); }
body.nav-open .nav-toggle span:nth-child(1){ transform:translateY(7px) rotate(45deg); }
body.nav-open .nav-toggle span:nth-child(2){ opacity:0; }
body.nav-open .nav-toggle span:nth-child(3){ transform:translateY(-7px) rotate(-45deg); }
body.nav-open .nav-toggle span{ background:var(--color-ink); }

.nav-mobile{
  position:fixed; inset:76px 0 0 0; background:var(--color-bg);
  transform:translateY(-8px); opacity:0; pointer-events:none;
  transition:opacity .25s ease, transform .25s ease;
  display:flex; flex-direction:column; padding:1.5rem 1.5rem 2rem;
  z-index:99;
}
body.nav-open .nav-mobile{ opacity:1; transform:translateY(0); pointer-events:auto; }
.nav-mobile a{
  font-family:var(--font-display); font-size:1.6rem; padding:.7rem 0;
  border-bottom:1px solid var(--color-line); color:var(--color-ink);
}
.nav-mobile .btn{ margin-top:1.5rem; align-self:flex-start; }

@media (min-width:880px){
  .nav-desktop{ display:flex; }
  .nav-toggle{ display:none; }
  .nav-mobile{ display:none; }
}

/* ================================================================
   SECTION 2 — HERO
   ================================================================ */
.hero{
  background:var(--color-ink); color:#F4F3EC; position:relative; overflow:hidden;
  padding-top:clamp(3rem,8vw,5rem); padding-bottom:clamp(4rem,9vw,6rem);
  margin-top:-76px;
}
.hero-rings{
  position:absolute; top:-180px; right:-180px; width:560px; height:560px;
  border-radius:50%; pointer-events:none;
}
.hero-rings circle{ fill:none; stroke:var(--color-brass); opacity:.18; }
.hero-inner{ padding-top:76px; position:relative; z-index:2; }
.hero-grid{ display:grid; gap:2.5rem; align-items:start; }
.hero h1{
  font-size:clamp(2.4rem, 5.6vw, 4.1rem); font-weight:600; max-width:14ch;
  margin-bottom:1.4rem;
}
.hero-lede{ font-size:1.15rem; color:var(--color-paper-text); max-width:46ch; margin-bottom:2rem; }
.hero-actions{ display:flex; flex-wrap:wrap; gap:1rem; margin-bottom:2.8rem; }
.hero-social{ display:flex; gap:1.1rem; }
.hero-social a{
  width:36px; height:36px; border:1px solid var(--color-line-dark); border-radius:50%;
  display:flex; align-items:center; justify-content:center; color:#F4F3EC; opacity:.75;
  transition:opacity .2s ease, border-color .2s ease;
}
.hero-social a:hover{ opacity:1; border-color:var(--color-brass); }
.hero-social svg{ width:16px; height:16px; }

.hero-stats{
  display:grid; grid-template-columns:repeat(3,1fr); gap:1.5rem;
  border-top:1px solid var(--color-line-dark); padding-top:2rem; margin-top:1rem;
}
.hero-stats .stat-value{
  font-family:var(--font-mono); font-size:clamp(1.5rem,2.6vw,2rem); color:var(--color-brass); font-weight:500;
}
.hero-stats .stat-label{ font-size:.82rem; color:var(--color-paper-text); margin-top:.3rem; }

/* ---------- Route divider (signature element) ---------- */
.route-divider{
  position:relative; padding:3rem 0; background:var(--color-bg);
}
.route-divider::before{
  content:""; position:absolute; left:0; right:0; top:50%;
  border-top:2px dashed var(--color-line); transform:translateY(-1px);
}
.route-divider .container{ display:flex; justify-content:center; }
.route-pin{
  position:relative; z-index:2; display:flex; align-items:center; gap:.6rem;
  background:var(--color-bg); padding:0 1.2rem;
}
.route-pin .pin-badge{
  width:38px; height:38px; border-radius:50%; background:var(--color-surface);
  border:1px solid var(--color-line); display:flex; align-items:center; justify-content:center;
  color:var(--color-brass); box-shadow:0 4px 14px rgba(21,37,42,0.08);
  transition:transform .4s ease;
}
.route-divider.in-view .pin-badge{ transform:scale(1.12); }
.route-pin .pin-badge svg{ width:18px; height:18px; }
.route-pin span{ font-family:var(--font-mono); font-size:.74rem; letter-spacing:.1em; text-transform:uppercase; color:var(--color-ink-soft); }

/* ================================================================
   SECTION 3 — WHY CHOOSE US
   ================================================================ */
.why{ padding:var(--section-pad) 0; }
.why-grid{ display:grid; gap:3rem; align-items:center; }
.why-art{
  background:var(--color-surface); border-radius:var(--radius-md); border:1px solid var(--color-line);
  padding:2rem; aspect-ratio:4/3.2; display:flex; align-items:center; justify-content:center;
}
.why-points{ display:grid; grid-template-columns:1fr; gap:1.6rem; margin:2.2rem 0 2.2rem; }
@media (min-width:560px){ .why-points{ grid-template-columns:1fr 1fr; } }
.why-point{ display:flex; gap:.85rem; }
.why-point .ico{
  width:28px; height:28px; flex:none; color:var(--color-teal); margin-top:.1rem;
}
.why-point .ico svg{ width:18px; height:18px; }
.why-point h3{ font-family:var(--font-body); font-size:1rem; font-weight:700; margin-bottom:.25rem; }
.why-point p{ color:var(--color-ink-soft); font-size:.93rem; }

/* ================================================================
   SECTION 4 — SERVICES
   ================================================================ */
.services{ padding:var(--section-pad) 0; background:var(--color-surface); border-top:1px solid var(--color-line); border-bottom:1px solid var(--color-line); }
.services-head{ display:flex; flex-wrap:wrap; justify-content:space-between; align-items:flex-end; gap:1.5rem; }
.services-grid{
  display:grid; grid-template-columns:1fr; gap:1.5rem; margin-top:2.8rem;
}
@media (min-width:680px){ .services-grid{ grid-template-columns:1fr 1fr; } }
@media (min-width:1020px){ .services-grid{ grid-template-columns:repeat(4,1fr); } }
.service-card{
  background:var(--color-bg); border:1px solid var(--color-line); border-radius:var(--radius-md);
  padding:1.8rem; transition:transform .25s ease, box-shadow .25s ease;
}
.service-card:hover{ transform:translateY(-4px); box-shadow:0 12px 28px rgba(21,37,42,0.08); }
.service-card .ico{
  width:46px; height:46px; border-radius:50%; background:var(--color-ink); color:var(--color-brass);
  display:flex; align-items:center; justify-content:center; margin-bottom:1.2rem;
}
.service-card .ico svg{ width:22px; height:22px; }
.service-card h3{ font-family:var(--font-body); font-size:1.05rem; font-weight:700; margin-bottom:.6rem; }
.service-card p{ color:var(--color-ink-soft); font-size:.92rem; }

/* ================================================================
   SECTION 5 — INSIGHTS / BLOG
   ================================================================ */
.insights{ padding:var(--section-pad) 0; }
.insights-head{ display:flex; flex-wrap:wrap; justify-content:space-between; align-items:flex-end; gap:1.5rem; }
.insights-grid{ display:grid; grid-template-columns:1fr; gap:1.8rem; margin-top:2.8rem; }
@media (min-width:760px){ .insights-grid{ grid-template-columns:repeat(3,1fr); } }
.insight-card{ display:flex; flex-direction:column; }
.insight-thumb{
  background:linear-gradient(135deg, var(--color-ink), #234047);
  border-radius:var(--radius-md); aspect-ratio:16/10; margin-bottom:1.2rem;
  display:flex; align-items:flex-end; padding:1rem; position:relative; overflow:hidden;
}
.insight-thumb .tag{
  font-family:var(--font-mono); font-size:.7rem; letter-spacing:.08em; text-transform:uppercase;
  background:rgba(244,243,236,0.92); color:var(--color-ink); padding:.3rem .65rem; border-radius:3px;
}
.insight-card h3{ font-family:var(--font-body); font-size:1.05rem; font-weight:700; margin-bottom:.5rem; line-height:1.35; }
.insight-card .meta{ font-family:var(--font-mono); font-size:.75rem; color:var(--color-ink-soft); margin-bottom:.6rem; display:block; }
.insight-card p{ color:var(--color-ink-soft); font-size:.92rem; margin-bottom:.9rem; }

/* ================================================================
   SECTION 6 — CLIENTS
   ================================================================ */
.clients{ padding:var(--section-pad) 0; background:var(--color-ink); color:#F4F3EC; }
.clients .section-head h2{ color:#F4F3EC; }
.clients .section-head p{ color:var(--color-paper-text); }
.clients-grid{
  display:grid; grid-template-columns:repeat(2,1fr); gap:1px; margin-top:2.5rem;
  background:var(--color-line-dark); border:1px solid var(--color-line-dark);
}
@media (min-width:640px){ .clients-grid{ grid-template-columns:repeat(4,1fr); } }
.client-cell{
  background:var(--color-ink); padding:1.8rem 1rem; display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-size:.85rem; letter-spacing:.03em; color:var(--color-paper-text);
  text-align:center; transition:color .2s ease;
}
.client-cell:hover{ color:var(--color-brass); }

/* ================================================================
   SECTION 7 — TESTIMONIALS
   ================================================================ */
.testimonials{ padding:var(--section-pad) 0; }
.testi-grid{ display:grid; grid-template-columns:1fr; gap:1.6rem; margin-top:2.8rem; }
@media (min-width:780px){ .testi-grid{ grid-template-columns:repeat(3,1fr); } }
.testi-card{
  background:var(--color-surface); border:1px solid var(--color-line); border-radius:var(--radius-md);
  padding:1.9rem; display:flex; flex-direction:column; justify-content:space-between;
}
.testi-quote{ font-family:var(--font-display); font-size:1.08rem; line-height:1.45; margin-bottom:1.4rem; }
.testi-quote::before{ content:"“"; color:var(--color-brass); }
.testi-quote::after{ content:"”"; color:var(--color-brass); }
.testi-who{ font-size:.85rem; color:var(--color-ink-soft); }
.testi-who strong{ display:block; color:var(--color-ink); font-weight:700; }

/* ================================================================
   SECTION 8 — FAQ
   ================================================================ */
.faq{ padding:var(--section-pad) 0; background:var(--color-surface); border-top:1px solid var(--color-line); }
.faq-list{ max-width:760px; margin-top:2.5rem; }
.faq-item{ border-bottom:1px solid var(--color-line); }
.faq-q{
  width:100%; display:flex; align-items:center; justify-content:space-between; gap:1rem;
  padding:1.3rem 0; text-align:left; font-family:var(--font-body); font-weight:600; font-size:1rem;
  color:var(--color-ink);
}
.faq-icon{
  position:relative; width:18px; height:18px; flex:none;
}
.faq-icon::before, .faq-icon::after{
  content:""; position:absolute; background:var(--color-teal); transition:transform .25s ease;
}
.faq-icon::before{ top:8px; left:0; width:18px; height:2px; }
.faq-icon::after{ top:0; left:8px; width:2px; height:18px; }
.faq-item.open .faq-icon::after{ transform:rotate(90deg); }
.faq-a{ padding:0 0 1.4rem; max-width:62ch; }
.faq-a p{ color:var(--color-ink-soft); font-size:.95rem; }

/* ================================================================
   SECTION 9 — NEWSLETTER
   ================================================================ */
.newsletter{ padding:var(--section-pad) 0; }
.newsletter-box{
  background:var(--color-ink); color:#F4F3EC; border-radius:var(--radius-md);
  padding:clamp(2rem,5vw,3.2rem); display:grid; gap:1.8rem; align-items:center;
}
@media (min-width:760px){ .newsletter-box{ grid-template-columns:1.1fr 1fr; } }
.newsletter-box h2{ font-size:clamp(1.6rem,2.8vw,2.1rem); margin-bottom:.7rem; }
.newsletter-box p{ color:var(--color-paper-text); }
.newsletter-form{ display:flex; gap:.7rem; flex-wrap:wrap; }
.newsletter-form input{
  flex:1 1 200px; padding:.85rem 1rem; border-radius:var(--radius-sm); border:1px solid var(--color-line-dark);
  background:rgba(244,243,236,0.06); color:#F4F3EC; font-family:var(--font-body); font-size:.95rem;
}
.newsletter-form input::placeholder{ color:rgba(244,243,236,0.55); }
.newsletter-note{ font-size:.85rem; color:var(--color-brass); margin-top:.8rem; min-height:1.2em; }

/* ================================================================
   SECTION 10 — FOOTER
   ================================================================ */
.site-footer{ background:var(--color-ink); color:#F4F3EC; padding:3.5rem 0 2rem; border-top:1px solid var(--color-line-dark); }
.footer-grid{ display:grid; gap:2.5rem; margin-bottom:2.5rem; }
@media (min-width:780px){ .footer-grid{ grid-template-columns:1.3fr 1fr 1fr; } }
.footer-brand .logo{ display:inline-block; margin-bottom:.9rem; }
.footer-brand p{ color:var(--color-paper-text); font-size:.92rem; max-width:32ch; }
.footer-col h4{ font-family:var(--font-mono); font-size:.74rem; letter-spacing:.1em; text-transform:uppercase; color:var(--color-brass); margin-bottom:1rem; }
.footer-col a, .footer-col li{ color:var(--color-paper-text); font-size:.92rem; display:block; margin-bottom:.65rem; }
.footer-col a:hover{ color:#F4F3EC; }
.footer-social{ display:flex; gap:.8rem; margin-top:1rem; }
.footer-social a{
  width:32px; height:32px; border:1px solid var(--color-line-dark); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
}
.footer-social svg{ width:14px; height:14px; }
.footer-bottom{
  display:flex; flex-wrap:wrap; justify-content:space-between; gap:1rem;
  border-top:1px solid var(--color-line-dark); padding-top:1.6rem;
  font-size:.82rem; color:var(--color-paper-text);
}
.footer-bottom .legal{ display:flex; gap:1.3rem; }

/* ---------- Scroll reveal ---------- */
.reveal{ opacity:0; transform:translateY(16px); transition:opacity .6s ease, transform .6s ease; }
.reveal.visible{ opacity:1; transform:none; }

@media (min-width:760px){
  .hero-grid{ grid-template-columns:1.3fr 1fr; }
  .why-grid{ grid-template-columns:1fr 1fr; }
}

@media (prefers-reduced-motion: reduce){
  html{ scroll-behavior:auto; }
  .reveal{ opacity:1!important; transform:none!important; transition:none!important; }
  .service-card, .pin-badge, .nav-mobile, .nav-toggle span{ transition:none!important; }
}
</style>
</head>
<body>

<a class="skip-link" href="#main">Skip to content</a>

<!-- ================================================================
     SECTION 1 — HEADER / NAV
     Edit nav links in SITE_CONTENT.nav, brand name in SITE_CONTENT.meta
     ================================================================ -->
<header class="site-header" id="site-header">
  <div class="container header-inner">
    <a class="logo" href="#home" id="logoText">BetQraft <span>Consulting</span></a>
    <nav class="nav-desktop" id="nav-desktop" aria-label="Primary"></nav>
    <div class="header-actions">
      <a class="btn btn-primary btn-sm" href="#newsletter-form-anchor" id="headerCta">Book a call</a>
      <button class="nav-toggle" id="navToggle" aria-label="Open menu" aria-expanded="false" aria-controls="nav-mobile">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
  <nav class="nav-mobile" id="nav-mobile" aria-label="Mobile"></nav>
</header>

<main id="main">

<!-- ================================================================
     SECTION 2 — HERO
     Edit headline, body copy, CTA, and the 3 stats in SITE_CONTENT.hero
     ================================================================ -->
<section class="hero" id="home">
  <svg class="hero-rings" viewBox="0 0 560 560" aria-hidden="true">
    <circle cx="280" cy="280" r="180"></circle>
    <circle cx="280" cy="280" r="240"></circle>
    <circle cx="280" cy="280" r="270"></circle>
  </svg>
  <div class="container hero-inner">
    <div class="hero-grid">
      <div>
        <span class="eyebrow" id="heroEyebrow"></span>
        <h1 id="heroHeadline"></h1>
        <p class="hero-lede" id="heroLede"></p>
        <div class="hero-actions">
          <a class="btn btn-primary" id="heroCta" href="#newsletter-form-anchor"></a>
          <a class="btn btn-ghost on-dark" href="#services">See what we do</a>
        </div>
        <div class="hero-social" id="heroSocial"></div>
      </div>
      <div>
        <div class="hero-stats" id="heroStats"></div>
      </div>
    </div>
  </div>
</section>

<!-- Signature element: route divider, reused as a quiet section break -->
<div class="route-divider" id="routeDivider">
  <div class="container">

function setupHeaderScroll(){
  const header = document.getElementById('site-header');
  const onScroll = () => header.classList.toggle('is-scrolled', window.scrollY > 40);
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
}

function setupNavToggle(){
  const toggle = document.getElementById('navToggle');
  toggle.addEventListener('click', () => {
    const open = document.body.classList.toggle('nav-open');
    toggle.setAttribute('aria-expanded', String(open));
  });
  document.getElementById('nav-mobile').addEventListener('click', (e) => {
    if (e.target.tagName === 'A') {
      document.body.classList.remove('nav-open');
      toggle.setAttribute('aria-expanded', 'false');
    }
  });
}

function setupRouteDividerReveal(){
  const el = document.getElementById('routeDivider');
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        el.classList.add('in-view');
        obs.unobserve(el);
      }
    });
  }, { threshold: 0.5 });
  obs.observe(el);
}

function setupReveal(){
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        obs.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
}
